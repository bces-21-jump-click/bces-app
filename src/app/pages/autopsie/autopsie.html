<div class="autopsie-page">
  <div class="page-header">
    <button class="btn-back" (click)="retour()">← Retour</button>
    <h1>🔬 {{ autopsie().id ? 'Rapport #' + autopsie().id : 'Nouvelle autopsie' }}</h1>
  </div>

  @if (chargement()) {
  <div class="loading">Chargement...</div>
  } @else {
  <div class="form-grid">
    <section class="form-section">
      <h2>Informations générales</h2>
      <div class="form-row">
        <label>
          Nom du patient
          <input type="text" [ngModel]="autopsie().name"
            (ngModelChange)="autopsie.update(a => ({...a, name: $event}))" />
        </label>
        <label>
          CID
          <input type="text" [ngModel]="autopsie().cid" (ngModelChange)="autopsie.update(a => ({...a, cid: $event}))" />
        </label>
      </div>
      <div class="form-row">
        <label>
          Médecin
          <input type="text" [ngModel]="autopsie().doctor"
            (ngModelChange)="autopsie.update(a => ({...a, doctor: $event}))" />
        </label>
        <label>
          Légiste
          <input type="text" [ngModel]="autopsie().legist"
            (ngModelChange)="autopsie.update(a => ({...a, legist: $event}))" />
        </label>
      </div>
      <div class="form-row">
        <label>
          Date d'autopsie
          <input type="date" [ngModel]="autopsie().autopsyDate"
            (ngModelChange)="autopsie.update(a => ({...a, autopsyDate: $event}))" />
        </label>
      </div>
    </section>

    <section class="form-section">
      <div class="section-header">
        <h2>Blessures</h2>
        <button class="btn-small" (click)="ajouterBlessure()">+ Ajouter</button>
      </div>
      @for (b of autopsie().injuries; track $index; let i = $index) {
      <div class="blessure-card">
        <div class="form-row">
          <label>
            Zone
            <select [ngModel]="b.zone" (ngModelChange)="majBlessure(i, 'zone', $event)">
              <option value="">Sélectionner</option>
              @for (z of zonesCorps; track z) {
              <option [value]="z">{{ z }}</option>
              }
            </select>
          </label>
          <label>
            Type
            <select [ngModel]="b.type" (ngModelChange)="majBlessure(i, 'type', $event)">
              <option value="">Sélectionner</option>
              @for (t of typesBlessure; track t) {
              <option [value]="t">{{ t }}</option>
              }
            </select>
          </label>
          <button class="btn-delete" (click)="supprimerBlessure(i)" aria-label="Supprimer la blessure">✕</button>
        </div>
        <label>
          Description
          <textarea rows="2" [ngModel]="b.description"
            (ngModelChange)="majBlessure(i, 'description', $event)"></textarea>
        </label>
      </div>
      } @empty {
      <p class="empty">Aucune blessure enregistrée</p>
      }
    </section>

    <section class="form-section">
      <h2>Conclusions</h2>
      <label>
        Diagnostic
        <input type="text" [ngModel]="autopsie().diagnostic"
          (ngModelChange)="autopsie.update(a => ({...a, diagnostic: $event}))" />
      </label>
      <label>
        Bilan sanguin
        <textarea rows="3" [ngModel]="autopsie().bloodBilan"
          (ngModelChange)="autopsie.update(a => ({...a, bloodBilan: $event}))"></textarea>
      </label>
      <label>
        Résumé d'autopsie
        <textarea rows="4" [ngModel]="autopsie().autopsySummary"
          (ngModelChange)="autopsie.update(a => ({...a, autopsySummary: $event}))"></textarea>
      </label>
    </section>
  </div>
  }
</div>
